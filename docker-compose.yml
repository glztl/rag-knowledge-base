version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: always
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - upload_storage:/app/uploads
    networks:
      - rag-network
    expose:
      - "11000"
    depends_on:
      - postgres-check

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: rag-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
    networks:
      - rag-network
    expose:
      - "3000"
    depends_on:
      - backend

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro 
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rag-network

  # PostgreSQL 健康检查（不启动新容器，只检查现有）
  postgres-check:
    image: alpine:latest
    container_name: rag-postgres-check
    restart: "no"
    command: >
      sh -c "echo 'PostgreSQL 已存在，跳过启动' && sleep 2"
    networks:
      - rag-network

volumes:
  upload_storage:

networks:
  rag-network:
    driver: bridge